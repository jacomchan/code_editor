<!DOCTYPE html>\n<html lang="en">\n<head>\n    <meta charset="UTF-8">\n    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n    <title>Code Editor Mockup</title>\n    <style>\n        body {\n            background-color: #282c34;\n            color: #abb2bf;\n            font-family: 'Courier New', Courier, monospace;\n            display: flex;\n            justify-content: center;\n            align-items: center;\n            height: 100vh;\n            margin: 0;\n        }\n        #editor {\n            width: 80%;\n            height: 80%;\n            border: 1px solid #444;\n            padding: 10px;\n            background-color: #21252b;\n            position: relative;\n            overflow: auto;\n            font-size: 16px;\n        }\n        .line-numbers {\n            position: absolute;\n            left: 0;\n            width: 40px;\n            border-right: 1px solid #444;\n            padding-right: 10px;\n            text-align: right;\n            color: #5c6370;\n        }\n        .line {\n            height: 20px;\n        }\n        .autocomplete-suggestions {\n            position: absolute;\n            background-color: #444;\n            border: 1px solid #666;\n            display: none;\n            z-index: 1;\n            max-height: 150px;\n            overflow-y: auto;\n        }\n        .autocomplete-suggestion {\n            padding: 5px;\n            cursor: pointer;\n        }\n        .autocomplete-suggestion:hover {\n            background-color: #555;\n        }\n        .keyword {\n            color: #c678dd;\n        }\n        .string {\n            color: #98c379;\n        }\n        .comment {\n            color: #5c6370;\n            font-style: italic;\n        }\n    </style>\n</head>\n<body>\n    <div id="editor">\n        <div class="line-numbers">1\n2\n3\n4\n5\n</div>\n        <div class="line"><span class="keyword">const</span> editor = <span class="string">"Hello, World!"</span>; <span class="comment">// A sample line</span></div>\n        <div class="line"><span class="keyword">function</span> autocomplete() {}</div>\n        <div class="line">console.<span class="keyword">log</span>(editor);</div>\n    </div>\n    <div class="autocomplete-suggestions" id="suggestions"></div>\n    <script>\n        const editor = document.getElementById('editor');\n        const suggestions = document.getElementById('suggestions');\n        const keywords = ['const', 'function', 'console', 'log'];\n\n        editor.addEventListener('input', (e) => {\n            const input = e.target.innerText;\n            const lastWord = input.split(' ').pop();\n            if (lastWord.length > 0) {\n                showSuggestions(lastWord);\n            } else {\n                suggestions.style.display = 'none';\n            }\n        });\n\n        function showSuggestions(word) {\n            suggestions.innerHTML = '';\n            const matched = keywords.filter(k => k.startsWith(word));\n            matched.forEach(s => {\n                const div = document.createElement('div');\n                div.classList.add('autocomplete-suggestion');\n                div.innerText = s;\n                div.onclick = () => selectSuggestion(s);\n                suggestions.appendChild(div);\n            });\n            suggestions.style.display = matched.length ? 'block' : 'none';\n        }\n\n        function selectSuggestion(s) {\n            const input = editor.innerText;\n            const words = input.split(' ');\n            words[words.length - 1] = s;\n            editor.innerText = words.join(' ');\n            editor.focus();\n            suggestions.style.display = 'none';\n        }\n    </script>\n</body>\n</html>
